name: ci
on: [push, pull_request]
jobs:
  ci-backend:
    name: Unit test backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
      - name: Insstall
        working-directory: ./backend
        run: npm install
      - name: Test
        run: npm test
        working-directory: ./backend
